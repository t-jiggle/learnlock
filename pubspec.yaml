name: learnlock
description: "LearnLock - Educational gating app for children. Earn screen time through learning!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  googleapis: ^11.4.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Local storage
  shared_preferences: ^2.3.3

  # UI enhancements
  lottie: ^3.1.3
  confetti: ^0.8.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Audio
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0

  # Networking (for AI providers)
  http: ^1.2.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/lottie/
    - assets/data/
